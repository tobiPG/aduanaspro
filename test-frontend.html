<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Clasificador Arancelario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .test-section h2 {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .result pre {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .error {
            background: #fee;
            border-left-color: #f44;
        }
        
        .success {
            background: #efe;
            border-left-color: #4f4;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Clasificador Arancelario</h1>
        <p class="subtitle">Prueba rápida del sistema mejorado</p>
        
        <div id="status" class="status offline">
            ⚠️ Verificando conexión con el servidor...
        </div>
        
        <div class="test-section">
            <h2>📝 Clasificación por Texto</h2>
            <textarea id="producto" placeholder="Describe el producto a clasificar...&#10;&#10;Ejemplo: Smartphone Samsung Galaxy S23, pantalla AMOLED 6.1 pulgadas, 8GB RAM, 256GB almacenamiento, cámara 50MP, 5G, Android, fabricado en Corea del Sur">Laptop Dell Inspiron 15, procesador Intel Core i7 de 11va generación, 16GB RAM DDR4, disco duro SSD de 512GB, pantalla Full HD de 15.6 pulgadas, tarjeta gráfica NVIDIA GeForce MX450, sistema operativo Windows 11, fabricada en China, color plata</textarea>
            <button onclick="clasificarTexto()">🚀 Clasificar Producto</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Clasificando con IA... Esto puede tomar unos segundos</p>
        </div>
        
        <div class="result" id="result">
            <h3>Resultado:</h3>
            <pre id="resultContent"></pre>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3050';
        
        // Verificar estado del servidor al cargar
        async function checkServer() {
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    statusDiv.className = 'status online';
                    statusDiv.innerHTML = '✅ Servidor conectado y listo';
                } else {
                    throw new Error('Servidor no disponible');
                }
            } catch (error) {
                statusDiv.className = 'status offline';
                statusDiv.innerHTML = '❌ Servidor no disponible - Inicia el backend primero';
            }
        }
        
        async function clasificarTexto() {
            const producto = document.getElementById('producto').value.trim();
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            
            if (!producto) {
                alert('Por favor, ingresa la descripción del producto');
                return;
            }
            
            // Mostrar loading
            loadingDiv.classList.add('show');
            resultDiv.classList.remove('show', 'error', 'success');
            
            try {
                const response = await fetch(`${API_URL}/clasificar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        producto: producto,
                        solo_hs: false
                    })
                });
                
                const data = await response.json();
                
                loadingDiv.classList.remove('show');
                resultDiv.classList.add('show');
                
                if (response.ok && data.success) {
                    resultDiv.classList.add('success');
                    resultContent.textContent = JSON.stringify(data, null, 2);
                } else {
                    resultDiv.classList.add('error');
                    resultContent.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                loadingDiv.classList.remove('show');
                resultDiv.classList.add('show', 'error');
                resultContent.textContent = `Error: ${error.message}\n\nAsegúrate de que el servidor backend esté corriendo en el puerto 3050`;
            }
        }
        
        // Verificar servidor al cargar
        checkServer();
        
        // Verificar cada 5 segundos
        setInterval(checkServer, 5000);
    </script>
</body>
</html>
