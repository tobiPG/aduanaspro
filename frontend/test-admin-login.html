<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        
        .credentials {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }
        
        .credentials h3 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 10px;
        }
        
        .credentials p {
            font-family: monospace;
            font-size: 13px;
            color: #1e293b;
            margin: 5px 0;
        }
        
        .credentials strong {
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Login Administrador</h1>
        <p class="subtitle">Clasificador Arancelario</p>
        
        <div class="credentials">
            <h3>Credenciales de Prueba:</h3>
            <p><strong>Email:</strong> admin@clasificador.com</p>
            <p><strong>Password:</strong> admin123</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input 
                    type="email" 
                    id="correo" 
                    value="admin@clasificador.com"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="contrasena">Contraseña</label>
                <input 
                    type="password" 
                    id="contrasena" 
                    value="admin123"
                    required
                >
            </div>
            
            <button type="submit" class="btn" id="btnLogin">
                Iniciar Sesión
            </button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3050';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btnLogin');
            const message = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = 'Iniciando sesión...';
            message.style.display = 'none';
            
            const correo = document.getElementById('correo').value;
            const contrasena = document.getElementById('contrasena').value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ correo, contrasena })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.requiere_2fa) {
                        // Mostrar que requiere 2FA
                        message.className = 'message error';
                        message.textContent = 'Este usuario requiere 2FA. Por favor, desactiva 2FA en la BD o implementa el flujo completo.';
                        message.style.display = 'block';
                    } else {
                        // Login exitoso
                        localStorage.setItem('authToken', data.token);
                        
                        message.className = 'message success';
                        message.textContent = '✅ Login exitoso! Redirigiendo al panel admin...';
                        message.style.display = 'block';
                        
                        // Verificar que es admin
                        const verifyResponse = await fetch(`${API_BASE_URL}/api/auth/verificar`, {
                            headers: {
                                'Authorization': `Bearer ${data.token}`
                            }
                        });
                        
                        const verifyData = await verifyResponse.json();
                        
                        if (verifyData.success && verifyData.usuario.rol === 'admin') {
                            setTimeout(() => {
                                window.location.href = 'admin-panel.html';
                            }, 1500);
                        } else {
                            message.className = 'message error';
                            message.textContent = '❌ Este usuario no tiene permisos de administrador';
                        }
                    }
                } else {
                    message.className = 'message error';
                    message.textContent = `❌ ${data.mensaje || 'Error en el login'}`;
                    message.style.display = 'block';
                }
                
            } catch (error) {
                console.error('Error:', error);
                message.className = 'message error';
                message.textContent = '❌ Error de conexión con el servidor';
                message.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>
</html>
