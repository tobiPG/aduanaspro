<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload PDF</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 30px;
            background: #f8f9ff;
        }
        h1 {
            color: #667eea;
        }
        .form-group {
            margin: 20px 0;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        input[type="file"] {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            width: 100%;
        }
        .checkbox-group {
            margin: 15px 0;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #resultado {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: none;
        }
        .success {
            color: #059669;
        }
        .error {
            color: #dc2626;
        }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-download {
            background: #059669;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test de Upload PDF - Sistema ImportDUA</h1>
        <p>Prueba rápida del sistema de clasificación arancelaria con archivos PDF</p>
        
        <div class="form-group">
            <label for="archivo">Seleccionar PDF:</label>
            <input type="file" id="archivo" accept=".pdf" />
        </div>
        
        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="solo_hs" />
                Solo código HS (modo simplificado)
            </label>
        </div>
        
        <button id="btnClasificar" onclick="clasificar()" disabled>
            📤 Clasificar PDF
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Procesando PDF con IA...</p>
        </div>
        
        <div id="resultado">
            <h2 id="resultTitle"></h2>
            <pre id="resultContent"></pre>
            <button class="btn-download" onclick="descargarXML()" style="display: none;" id="btnXML">
                ⬇️ Descargar XML ImportDUA
            </button>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = 'http://localhost:3050';
        let resultadoActual = null;
        
        document.getElementById('archivo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            document.getElementById('btnClasificar').disabled = !file;
        });
        
        async function clasificar() {
            const fileInput = document.getElementById('archivo');
            const soloHS = document.getElementById('solo_hs').checked;
            
            if (!fileInput.files[0]) {
                alert('Selecciona un archivo PDF');
                return;
            }
            
            const formData = new FormData();
            formData.append('archivo', fileInput.files[0]);
            formData.append('solo_hs', soloHS);
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultado').style.display = 'none';
            document.getElementById('btnClasificar').disabled = true;
            
            try {
                const response = await fetch(`${API_BASE_URL}/clasificar-archivo`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                document.getElementById('loading').style.display = 'none';
                // Mostrar info de batch si aplica
                let batchInfo = '';
                if (result.data && result.data.ImpDeclarationProduct && Array.isArray(result.data.ImpDeclarationProduct)) {
                    const totalItems = result.data.ImpDeclarationProduct.length;
                    if (totalItems > 10) {
                        const numBatches = Math.ceil(totalItems / 10);
                        batchInfo = `\n⚡ Procesando en batch: ${numBatches} lotes de 10 items (total: ${totalItems})`;
                    } else {
                        batchInfo = `\nProcesamiento normal: ${totalItems} items`;
                    }
                }
                if (result.success) {
                    resultadoActual = result.data;
                    mostrarResultado(result, batchInfo);
                } else {
                    mostrarError((result.error || 'Error desconocido') + batchInfo);
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                mostrarError('Error de conexión: ' + error.message);
            } finally {
                document.getElementById('btnClasificar').disabled = false;
            }
        }
        
        function mostrarResultado(result, batchInfo = '') {
            const resultDiv = document.getElementById('resultado');
            const titleDiv = document.getElementById('resultTitle');
            const contentDiv = document.getElementById('resultContent');
            let info = '';
            if (batchInfo) {
                info = `<div style="margin-bottom:8px;color:#6366f1;font-weight:bold;">${batchInfo}</div>`;
            }
            titleDiv.innerHTML = '✅ <span class="success">Clasificación Exitosa</span>' + info;
            contentDiv.textContent = JSON.stringify(result.data, null, 2);
            resultDiv.style.display = 'block';
            // Mostrar botón de XML solo si hay estructura completa
            if (result.data.ImpDeclaration || result.data.ImpDeclarationProduct) {
                document.getElementById('btnXML').style.display = 'block';
            }
        }
        
        function mostrarError(mensaje) {
            const resultDiv = document.getElementById('resultado');
            const titleDiv = document.getElementById('resultTitle');
            const contentDiv = document.getElementById('resultContent');
            
            titleDiv.innerHTML = '❌ <span class="error">Error</span>';
            contentDiv.textContent = mensaje;
            
            resultDiv.style.display = 'block';
            document.getElementById('btnXML').style.display = 'none';
        }
        
        function descargarXML() {
            if (!resultadoActual) {
                alert('No hay datos para exportar');
                return;
            }
            
            const xmlContent = generateImportDUAXML(resultadoActual);
            const blob = new Blob([xmlContent], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ImportDUA_${new Date().getTime()}.xml`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function generateImportDUAXML(data) {
            function escapeXML(str) {
                if (str === null || str === undefined) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&apos;');
            }
            
            const impDeclaration = data.ImpDeclaration || {};
            const impSupplier = data.ImpDeclarationSupplier || {};
            const impProducts = data.ImpDeclarationProduct || [];
            const totales = data.TotalesCalculados || {};
            
            let xml = `<?xml version="1.0" encoding="UTF-8"?>
<ImportDUA xmlns="http://www.aduanas.gob.do/siga" version="2.0">
    <ImpDeclaration>
        <Date>${escapeXML(impDeclaration.Date || new Date().toISOString().split('T')[0])}</Date>
        <FOBValue>${escapeXML(impDeclaration.FOBValue || totales.TotalFOB || 0)}</FOBValue>
        <CurrencyCode>${escapeXML(impDeclaration.CurrencyCode || 'USD')}</CurrencyCode>
    </ImpDeclaration>
    
    <ImpDeclarationSupplier>
        <SupplierName>${escapeXML(impSupplier.SupplierName || '')}</SupplierName>
        <SupplierAddress>${escapeXML(impSupplier.SupplierAddress || '')}</SupplierAddress>
        <SupplierPhone>${escapeXML(impSupplier.SupplierPhone || '')}</SupplierPhone>
        <SupplierRNC>${escapeXML(impSupplier.SupplierRNC || '')}</SupplierRNC>
        <SupplierCountry>${escapeXML(impSupplier.SupplierCountry || '')}</SupplierCountry>
    </ImpDeclarationSupplier>
`;
            
            impProducts.forEach((product, index) => {
                xml += `
    <ImpDeclarationProduct>
        <ItemNumber>${index + 1}</ItemNumber>
        <HSCode>${escapeXML(product.HSCode || product.TariffCode || '')}</HSCode>
        <ProductName>${escapeXML(product.ProductName || '')}</ProductName>
        <Qty>${escapeXML(product.Qty || 1)}</Qty>
        <FOBValue>${escapeXML(product.FOBValue || 0)}</FOBValue>
        <OriginCountry>${escapeXML(product.OriginCountry || '')}</OriginCountry>
    </ImpDeclarationProduct>`;
            });
            
            xml += `
    
    <TotalesCalculados>
        <TotalFOB>${escapeXML(totales.TotalFOB || 0)}</TotalFOB>
        <TotalCIF>${escapeXML(totales.TotalCIF || totales.TotalFOB || 0)}</TotalCIF>
    </TotalesCalculados>
</ImportDUA>`;
            
            return xml;
        }
    </script>
</body>
</html>
